<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accredia Lab Explorer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        #map { z-index: 10; }
        .choices__list--dropdown { z-index: 50 !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans">
    <nav class="bg-slate-900 text-white p-4 shadow-lg flex items-center justify-between z-20 shrink-0">
        <div class="flex items-center gap-3">
            <i class="ph-fill ph-microscope text-2xl text-blue-400"></i>
            <h1 class="text-xl font-bold tracking-tight">Accredia Lab Explorer <span class="text-slate-500 text-sm font-normal">v2.2</span></h1>
        </div>
        <!-- Logo Alfa -->
        <img src="alfa.png" alt="Logo Alfa" class="h-12 object-contain">
    </nav>

    <div class="flex flex-1 overflow-hidden relative">
        <aside class="w-96 bg-white border-r border-slate-200 p-5 overflow-y-auto shrink-0 flex flex-col z-20 shadow-xl">
            <div class="space-y-6 flex-1">
                <section>
                    <h2 class="text-xs font-bold uppercase text-slate-400 mb-3 tracking-wider">Sincronizzazione Cloud</h2>
                    <button id="btnLoadFiles" class="w-full bg-blue-600 text-white py-3 rounded-lg text-sm font-semibold hover:bg-blue-700 transition shadow-sm flex items-center justify-center gap-2">
                        <i class="ph ph-cloud-arrow-down"></i> Sincronizza Dati
                    </button>
                </section>

                <section class="flex-1 flex flex-col min-h-0">
                    <h2 class="text-xs font-bold uppercase text-slate-400 mb-3 tracking-wider flex justify-between items-center">
                        Esplora Filtri
                        <button id="btnResetFilters" class="text-[10px] bg-slate-200 hover:bg-slate-300 text-slate-700 px-2 py-1 rounded transition">Resetta</button>
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">1. Categoria Matrice</label>
                            <select id="matrix-select" class="w-full p-2 border border-slate-300 rounded-lg text-sm bg-white shadow-sm outline-none focus:border-blue-500 transition cursor-pointer">
                                <option value="Tutte">Tutte le matrici</option>
                                <option value="Potabili">Potabili</option>
                                <option value="Reflue">Reflue</option>
                                <option value="Fanghi">Fanghi</option>
                                <option value="Altro">Altro</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">2. Gruppo di Analisi</label>
                            <select id="group-select" class="w-full p-2 border border-slate-300 rounded-lg text-sm bg-white shadow-sm outline-none focus:border-blue-500 transition cursor-pointer">
                                <option value="Tutti">Tutti i gruppi</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">3. Cerca Parametro (Multiplo)</label>
                            <select id="param-select" multiple class="w-full"></select>
                            <p class="text-[10px] text-slate-400 mt-1">Scegli la matrice/gruppo prima di cercare.</p>
                        </div>
                    </div>
                </section>
            </div>
<!-- Sezione Laboratori trovati (esistente) -->
<div class="mt-2 pt-4 border-t border-slate-200">
    <div class="flex justify-between items-center mb-3">
        <span class="text-sm font-semibold text-slate-700">Laboratori trovati:</span>
        <span id="labCount" class="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span>
    </div>

    <!-- Nuova Legenda -->
    <div class="grid grid-cols-3 gap-2 text-[10px] text-slate-500 font-medium">
        <div class="flex items-center gap-1.5">
            <div class="w-3 h-3 rounded-full shadow-sm" style="background-color: #2980B9;"></div>
            <span>Potabili</span>
        </div>
        <div class="flex items-center gap-1.5">
            <div class="w-3 h-3 rounded-full shadow-sm" style="background-color: #8E44AD;"></div>
            <span>Reflue</span>
        </div>
        <div class="flex items-center gap-1.5">
            <div class="w-3 h-3 rounded-full shadow-sm" style="background-color: #27AE60;"></div>
            <span>Entrambe</span>
        </div>
    </div>
</div>            

        </aside>

        <main class="flex-1 relative bg-slate-200">
            <div id="map" class="absolute inset-0"></div>
            
            <!-- Right Panel -->
            <div id="lab-details-panel" class="absolute top-0 right-0 h-full w-[600px] bg-white shadow-[-15px_0_20px_-5px_rgba(0,0,0,0.1)] transform translate-x-full transition-transform duration-300 ease-in-out z-[1000] flex flex-col">
                <div class="bg-slate-800 text-white p-5 shrink-0 flex justify-between items-start">
                    <div>
                        <h2 id="detail-name" class="text-2xl font-bold leading-tight">Nome Lab</h2>
                        <p id="detail-address" class="text-sm text-slate-300 mt-1 flex items-center gap-1"><i class="ph-fill ph-map-pin"></i> <span id="addr-text">Indirizzo</span></p>
                    </div>
                    <button id="btnClosePanel" class="text-slate-400 hover:text-white transition"><i class="ph ph-x text-2xl"></i></button>
                </div>
                
                <div class="px-5 py-3 border-b border-slate-100 bg-slate-50 shrink-0 flex gap-2 text-xs">
                    <span id="detail-accredia" class="bg-indigo-100 text-indigo-800 px-2 py-1 rounded font-medium border border-indigo-200">Accredia: N/D</span>
                    <span id="detail-type" class="bg-teal-100 text-teal-800 px-2 py-1 rounded font-medium border border-teal-200">Tipologia: N/D</span>
                </div>

                <div class="flex-1 overflow-y-auto">
                    <table class="w-full text-left text-sm text-slate-600">
                        <thead class="text-xs text-slate-500 uppercase bg-slate-100 sticky top-0 shadow-sm z-10">
                            <tr>
                                <th class="px-4 py-3 font-semibold">Matrice / Dettaglio</th>
                                <th class="px-4 py-3 font-semibold w-2/5">Parametro / Gruppo</th>
                                <th class="px-4 py-3 font-semibold">Metodo</th>
                                <th class="px-4 py-3 font-semibold">Tecnica</th>
                            </tr>
                        </thead>
                        <tbody id="detail-table-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        let map, markersGroup, choicesInstance;
        let appData = { labsMap: new Map(), groupsSet: new Set() };

        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            initChoices();
            setupEventListeners();
        });

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([45.5, 9.3], 9);
            L.control.zoom({ position: 'bottomleft' }).addTo(map);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
            markersGroup = L.layerGroup().addTo(map);
        }

        function initChoices() {
            choicesInstance = new Choices(document.getElementById('param-select'), {
                removeItemButton: true,
                searchEnabled: true,
                placeholderValue: "Digita per cercare...",
                itemSelectText: 'Seleziona',
                noResultsText: 'Nessun parametro trovato'
            });
        }

        function setupEventListeners() {
            document.getElementById('btnLoadFiles').addEventListener('click', processUploadedFiles);
            
            // Logica a Cascata
            document.getElementById('matrix-select').addEventListener('change', () => {
                updateGroupDropdown();
                updateParameterDropdown();
            });

            document.getElementById('group-select').addEventListener('change', updateParameterDropdown);

            document.getElementById('btnResetFilters').addEventListener('click', () => {
                document.getElementById('matrix-select').value = 'Tutte';
                document.getElementById('group-select').value = 'Tutti';
                choicesInstance.removeActiveItems();
                updateGroupDropdown();
                updateParameterDropdown();
            });
            
            document.getElementById('btnClosePanel').addEventListener('click', closePanel);
            
            // Aggiorna mappa quando si scelgono parametri
            document.getElementById('param-select').addEventListener('change', renderMap);
        }

        function normalizeRowKeys(row) {
            const normalized = {};
            for (let key in row) {
                let cleanKey = key.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                normalized[cleanKey] = row[key];
            }
            return normalized;
        }

        const URL_BASE = "https://script.google.com/macros/s/AKfycbwjOWUkaTm1E2grFQrUS62CmQh76n3qIQeW21-9Pii5yGuwVU_7UJZYpc5uYTEBXMfV/exec";
        const URL_SEDI = `${URL_BASE}?id=162EFpv5Oz_Ruli1DYXW8rU5XQByJFJQh`;
        const URL_PARAMETRI = `${URL_BASE}?id=1bV_T6u-2hgOJMP4dHfGFtQ_2QZY-7D1N`;

        async function fetchCSV(url) {
            const res = await fetch(url);
            const blob = await res.blob();
            const text = await new Response(blob).text();
            return new Promise((resolve, reject) => {
                Papa.parse(text, {
                    header: true,
                    delimiter: ";",
                    skipEmptyLines: 'greedy',
                    complete: r => resolve(r.data),
                    error: err => reject(err)
                });
            });
        }

        async function processUploadedFiles() {
            const btn = document.getElementById('btnLoadFiles');

            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Sincronizzazione...';
            btn.disabled = true;

            try {
                const [sediData, parametriData] = await Promise.all([fetchCSV(URL_SEDI), fetchCSV(URL_PARAMETRI)]);
                
                appData.labsMap.clear();
                appData.groupsSet.clear();

                // 1. Lettura Sedi
                sediData.forEach(rawRow => {
                    const row = normalizeRowKeys(rawRow);
                    const id = parseInt((row['idlaboratorio'] || row['idsede'] || '').replace(/\D/g, ''), 10);
                    if (!isNaN(id)) {
                        appData.labsMap.set(id, {
                            id,
                            name: row['denominazione'] || 'Sconosciuto',
                            address: row['indirizzosede'] || row['indirizzo'] || 'N/D',
                            accredia: row['naccredia'] || 'N/D',
                            type: row['tipologia'] || 'N/D',
                            lat: parseFloat((row['latitudine'] || '0').toString().replace(',', '.')),
                            lng: parseFloat((row['longitudine'] || '0').toString().replace(',', '.')),
                            paramsList: []
                        });
                    }
                });

                // 2. Lettura Parametri (Mapping Diretto)
                parametriData.forEach(rawRow => {
                    const row = normalizeRowKeys(rawRow);
                    const labId = parseInt((row['idlaboratorio'] || row['idsede'] || '').replace(/\D/g, ''), 10);
                    
                    const paramName = (row['parametro'] || '').trim();
                    const matrix = (row['matrice'] || '').trim();         // Valore esatto dalla tua nuova colonna Matrice
                    const subMatrix = (row['sottomatrice'] || '').trim(); // Valore dalla colonna Sotto_Matrice
                    const group = (row['gruppo'] || '').trim();           // Nuovo campo Gruppo
                    
                    if (!isNaN(labId) && paramName && appData.labsMap.has(labId)) {
                        if (group) appData.groupsSet.add(group);
                        
                        appData.labsMap.get(labId).paramsList.push({
                            matrix: matrix,
                            subMatrix: subMatrix,
                            group: group,
                            param: paramName,
                            method: row['metodo'] || '',
                            technique: row['tecnica'] || ''
                        });
                    }
                });

                btn.innerHTML = '<i class="ph ph-check-circle"></i> Aggiornato!';
                btn.classList.replace('bg-blue-600', 'bg-emerald-600');
                
                updateGroupDropdown();
                updateParameterDropdown();

            } catch (err) {
                alert("Errore nel formato del file: " + err);
                btn.innerHTML = '<i class="ph ph-warning"></i> Riprova';
            } finally {
                btn.disabled = false;
            }
        }

        function updateGroupDropdown() {
            const selectedMatrix = document.getElementById('matrix-select').value;
            const groupSelect = document.getElementById('group-select');
            const currentSelection = groupSelect.value;
            const availableGroups = new Set();

            appData.labsMap.forEach(lab => {
                lab.paramsList.forEach(p => {
                    if (selectedMatrix === 'Tutte' || p.matrix === selectedMatrix) {
                        if (p.group) availableGroups.add(p.group);
                    }
                });
            });

            while (groupSelect.options.length > 1) groupSelect.remove(1);

            Array.from(availableGroups).sort().forEach(g => {
                groupSelect.add(new Option(g, g));
            });

            groupSelect.value = availableGroups.has(currentSelection) ? currentSelection : 'Tutti';
        }

        function updateParameterDropdown() {
            const selMat = document.getElementById('matrix-select').value;
            const selGrp = document.getElementById('group-select').value;
            const availableParams = new Set();
            
            appData.labsMap.forEach(lab => {
                lab.paramsList.forEach(p => {
                    const matchMat = selMat === 'Tutte' || p.matrix === selMat;
                    const matchGrp = selGrp === 'Tutti' || p.group === selGrp;
                    if (matchMat && matchGrp) availableParams.add(p.param);
                });
            });

            const sortedParams = Array.from(availableParams).sort().map(p => ({ value: p, label: p }));
            const currentChoices = choicesInstance.getValue(true) || [];
            
            choicesInstance.clearStore();
            choicesInstance.setChoices(sortedParams, 'value', 'label', true);
            
            const validRe = currentChoices.filter(c => availableParams.has(c));
            if (validRe.length > 0) choicesInstance.setChoiceByValue(validRe);

            renderMap();
        }

        // --- FUNZIONE PER IL COLORE DEI PIN ---
        function getMarkerColor(tipologia) {
            const type = (tipologia || '').toLowerCase();
            if (type.includes('entramb') || (type.includes('potabili') && type.includes('reflue'))) {
                return '#27AE60'; // Entrambe (Verde)
            } else if (type.includes('reflue') || type.includes('scarico')) {
                return '#8E44AD'; // Reflue (Viola)
            } else if (type.includes('potabili')) {
                return '#2980B9'; // Potabili (Blu)
            }
            return '#94a3b8'; // Default/Altro (Grigio)
        }

        // --- FUNZIONE PER DISEGNARE IL PIN STILE MAPS ---
        function getPinIcon(color) {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 36" width="30" height="45">
                <path d="M12 0C5.373 0 0 5.373 0 12c0 8.442 11.233 23.109 11.583 23.57a.5.5 0 0 0 .834 0C12.767 35.109 24 20.442 24 12c0-6.627-5.373-12-12-12zm0 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12z" fill="${color}" stroke="white" stroke-width="1.5" />
            </svg>`;
            return L.divIcon({
                className: 'custom-pin-icon bg-transparent border-0',
                html: `<div style="filter: drop-shadow(0 4px 3px rgba(0,0,0,0.3));">${svg}</div>`,
                iconSize: [30, 45],
                iconAnchor: [15, 45], // La punta del pin al centro-basso
                popupAnchor: [0, -45],
                tooltipAnchor: [0, -45] // Sposta l'etichetta sopra il pin
            });
        }

        function renderMap() {
            markersGroup.clearLayers();
            closePanel();

            const selMat = document.getElementById('matrix-select').value;
            const selGrp = document.getElementById('group-select').value;
            const selParams = choicesInstance.getValue(true) || [];
            let count = 0;

            appData.labsMap.forEach(lab => {
                const validParams = lab.paramsList.filter(p => {
                    return (selMat === 'Tutte' || p.matrix === selMat) && 
                           (selGrp === 'Tutti' || p.group === selGrp);
                });
                
                const validNames = validParams.map(p => p.param);
                let isVisible = false;

                if (selParams.length === 0) {
                    isVisible = (selMat === 'Tutte' && selGrp === 'Tutti') ? true : validParams.length > 0;
                } else {
                    isVisible = selParams.every(sp => validNames.includes(sp));
                }

                if (isVisible && lab.lat && lab.lng) {
                    const pinColor = getMarkerColor(lab.type);
                    L.marker([lab.lat, lab.lng], { icon: getPinIcon(pinColor) })
                        .bindTooltip(`<b>${lab.name}</b><br><span class="text-xs text-slate-500">${lab.type}</span>`, { direction: 'top', offset: [0, -40] })
                        .on('click', () => openPanel(lab, selMat, selGrp))
                        .addTo(markersGroup);
                    count++;
                }
            });

            document.getElementById('labCount').innerText = count;
        }

        function openPanel(lab, currentMat, currentGrp) {
            document.getElementById('detail-name').innerText = lab.name;
            document.getElementById('addr-text').innerText = lab.address;
            document.getElementById('detail-accredia').innerText = `Accredia: ${lab.accredia}`;
            document.getElementById('detail-type').innerText = `Tipologia: ${lab.type}`;

            const tbody = document.getElementById('detail-table-body');
            tbody.innerHTML = ''; 

            const paramsToShow = lab.paramsList.filter(p => {
                return (currentMat === 'Tutte' || p.matrix === currentMat) &&
                       (currentGrp === 'Tutti' || p.group === currentGrp);
            });
            
            const sortedParams = [...paramsToShow].sort((a, b) => a.param.localeCompare(b.param));

            sortedParams.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition-colors";
                tr.innerHTML = `
                    <td class="px-4 py-3 align-top">
                        <div class="font-semibold text-slate-700 text-xs">${p.matrix}</div>
                        <div class="text-[10px] text-slate-400 mt-0.5 leading-tight">${p.subMatrix || '-'}</div>
                    </td>
                    <td class="px-4 py-3 align-top">
                        <div class="font-bold text-slate-800 text-sm leading-tight">${p.param}</div>
                        ${p.group ? `<div class="inline-block mt-1 bg-blue-100 text-blue-700 text-[10px] font-semibold px-2 py-0.5 rounded">${p.group}</div>` : ''}
                    </td>
                    <td class="px-4 py-3 text-xs text-slate-600 align-top">${p.method}</td>
                    <td class="px-4 py-3 text-xs text-slate-500 align-top">${p.technique || '-'}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('lab-details-panel').classList.remove('translate-x-full');
        }

        function closePanel() {
            document.getElementById('lab-details-panel').classList.add('translate-x-full');
        }
    </script>
</body>
</html>
