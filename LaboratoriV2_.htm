<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accredia Lab Explorer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        #map { z-index: 10; }
        .choices__list--dropdown { z-index: 50 !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans">
    <nav class="bg-slate-900 text-white px-6 h-20 shadow-lg flex items-center justify-between z-20 shrink-0">
        <div class="flex items-center gap-3">
            <i class="ph-fill ph-microscope text-2xl text-blue-400"></i>
            <h1 class="text-xl font-bold tracking-tight">Accredia Lab Explorer <span class="text-slate-500 text-sm font-normal">v2.2</span></h1>
        </div>
        <img src="alfa.png" alt="Logo Alfa" class="h-12 object-contain">
		</nav>

    <div class="flex flex-1 overflow-hidden relative">
        <aside class="w-96 bg-white border-r border-slate-200 p-5 overflow-y-auto shrink-0 flex flex-col z-20 shadow-xl">
            <div class="space-y-6 flex-1">
                <section>
                    <h2 class="text-xs font-bold uppercase text-slate-400 mb-3 tracking-wider">Sincronizzazione Cloud</h2>
                    <button id="btnSync" class="w-full bg-blue-600 text-white py-3 rounded-lg text-sm font-semibold hover:bg-blue-700 transition shadow-sm flex items-center justify-center gap-2">
                        <i class="ph ph-cloud-arrow-down"></i> Sincronizza Dati
                    </button>
                </section>

                <section class="flex-1 flex flex-col min-h-0">
                    <h2 class="text-xs font-bold uppercase text-slate-400 mb-3 tracking-wider flex justify-between items-center">
                        Filtri
                        <button id="btnResetFilters" class="text-[10px] bg-slate-200 hover:bg-slate-300 text-slate-700 px-2 py-1 rounded transition">Resetta</button>
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">1. Categoria Matrice</label>
                            <select id="matrix-select" class="w-full p-2 border border-slate-300 rounded-lg text-sm bg-white shadow-sm outline-none focus:border-blue-500 transition cursor-pointer">
                                <option value="Tutte">Tutte le matrici</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">2. Gruppo di Analisi</label>
                            <select id="group-select" class="w-full p-2 border border-slate-300 rounded-lg text-sm bg-white shadow-sm outline-none focus:border-blue-500 transition cursor-pointer">
                                <option value="Tutti">Tutti i gruppi</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">3. Cerca Parametro</label>
                            <select id="param-select" multiple class="w-full"></select>
                        </div>
                    </div>
                </section>
            </div>
            
            <div class="mt-4 pt-4 border-t border-slate-200 shrink-0">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-sm font-semibold text-slate-700">Laboratori trovati:</span>
                    <span id="labCount" class="bg-blue-100 text-blue-800 text-sm font-bold px-3 py-1 rounded-full">0</span>
                </div>
                <div class="grid grid-cols-3 gap-2 text-[10px] text-slate-500 font-medium">
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full" style="background-color: #2980B9;"></div><span>Potabili</span></div>
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full" style="background-color: #8E44AD;"></div><span>Reflue</span></div>
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full" style="background-color: #27AE60;"></div><span>Entrambe</span></div>
                </div>
            </div>
        </aside>

        <main class="flex-1 relative bg-slate-200">
            <div id="map" class="absolute inset-0"></div>
        </main>
    </div>

<script>
    const URL_BASE = "https://script.google.com/macros/s/AKfycbwjOWUkaTm1E2grFQrUS62CmQh76n3qIQeW21-9Pii5yGuwVU_7UJZYpc5uYTEBXMfV/exec";
    const URL_SEDI = `${URL_BASE}?id=162EFpv5Oz_Ruli1DYXW8rU5XQByJFJQh`;
    const URL_PARAMETRI = `${URL_BASE}?id=1bV_T6u-2hgOJMP4dHfGFtQ_2QZY-7D1N`;

    let map, markersGroup;
    let labsMap = new Map();

    document.addEventListener('DOMContentLoaded', () => {
        map = L.map('map').setView([45.45, 9.20], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        markersGroup = L.layerGroup().addTo(map);
        document.getElementById('btnSync').addEventListener('click', syncData);
    });

    async function fetchCSV(url) {
        const res = await fetch(url);
        const blob = await res.blob();
        const text = await new Response(blob).text();
        return new Promise((resolve, reject) => {
            Papa.parse(text, {
                header: true,
                skipEmptyLines: true,
                complete: r => resolve(r.data),
                error: err => reject(err)
            });
        });
    }

    async function syncData() {
        const btn = document.getElementById('btnSync');
        btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Sincronizzazione...';

        try {
            const [sediData, paramData] = await Promise.all([
                fetchCSV(URL_SEDI),
                fetchCSV(URL_PARAMETRI)
            ]);

            // Carica le sedi filtrando solo le righe con coordinate valide
            labsMap.clear();
            sediData.forEach(row => {
                const id = row.ID_Sede ? row.ID_Sede.trim() : "";
                const lat = parseFloat(row.Latitudine);
                const lng = parseFloat(row.Longitudine);
                if (id && !isNaN(lat) && !isNaN(lng)) {
                    labsMap.set(id, { ...row, Latitudine: lat, Longitudine: lng, parametri: [] });
                }
            });
            console.log(`Sedi caricate: ${labsMap.size}`);

            // Collega i parametri alle sedi
            let trovati = 0;
            paramData.forEach(row => {
                const id = row.ID_Sede ? row.ID_Sede.trim() : "";
                if (labsMap.has(id)) {
                    labsMap.get(id).parametri.push(row);
                    trovati++;
                }
            });
            console.log(`Parametri collegati: ${trovati}`);

            renderMarkers();
            btn.innerHTML = '<i class="ph ph-check-circle"></i> Aggiornato!';

        } catch (e) {
            console.error(e);
            alert("Errore Sync: " + e.message);
            btn.innerHTML = '<i class="ph ph-warning"></i> Riprova';
        }
    }

    function renderMarkers() {
        markersGroup.clearLayers();
        labsMap.forEach(lab => {
            const marker = L.marker([lab.Latitudine, lab.Longitudine]).addTo(markersGroup);
            marker.bindPopup(`<b>${lab.Denominazione}</b><br>${lab.Indirizzo}<br><small>Parametri: ${lab.parametri.length}</small>`);
        });
        document.getElementById('labCount').innerText = labsMap.size;
    }
</script>
</body>
</html>
